version: '3.9'

services:
  # ─────────────────────────────────────────────────────────
  # ZOOKEEPER - Quản lý Kafka cluster metadata
  # ─────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────
  # KAFKA BROKER
  # KAFKA_ADVERTISED_LISTENERS quan trọng:
  #   INTERNAL: container-to-container (dùng tên service 'kafka')
  #   EXTERNAL: host machine → container (dùng localhost:9092)
  # ─────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_LOG_RETENTION_HOURS: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────────────────
  # SPRING BOOT APP
  # Chạy sau khi Kafka healthy (topic cần broker running)
  # ─────────────────────────────────────────────────────────
  app:
    build:
      context: ./be_kafka
      dockerfile: Dockerfile
    container_name: kafka-chat-app
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/topic-info"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────────────────
  # FRONTEND (React/Vite - dev mode)
  # ─────────────────────────────────────────────────────────
  # frontend:
  #   image: node:20-alpine # Bản alpine sẽ nhẹ hơn
  #   container_name: frontend
  #   working_dir: /app
  #   volumes:
  #     - ./fe_kafka:/app
  #     - /app/node_modules # ✅ Giữ node_modules trong container, tránh xung đột với máy thật
  #   ports:
  #     - "5173:5173"
  #   command: sh -c "npm install && npm run dev"
  #   depends_on:
  #     - app
  frontend:
    build:
      context: ./fe_kafka
      dockerfile: Dockerfile
    container_name: frontend-prod
    ports:
      - "80:80" # Ánh xạ port web ra ngoài cho user truy cập
    depends_on:
      - app

  
